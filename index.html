<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mechanical Power</title>
    <style>
        :root {
            --primary: #2563eb;
            --surface: #ffffff;
            --bg: #f3f4f6;
            --text: #1f2937;
            --border: #e5e7eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --input-bg: #ffffff;
        }

        /* Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --surface: #1f2937;
                --text: #f3f4f6;
                --border: #374151;
                --input-bg: #111827;
            }
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .container { background: var(--surface); max-width: 500px; width: 100%; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
        .form-group { margin-bottom: 12px; flex: 1; }
        label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.8rem; opacity: 0.9; }
        select, input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; background: var(--input-bg); color: var(--text); }
        
        /* PBW Style */
        .pbw-box { height: 46px; background: rgba(37, 99, 235, 0.1); border: 1px dashed var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); }

        .toggle-row { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 15px; }

        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        .btn-copy { background: #6b7280; margin-top: 5px; font-size: 0.8rem; padding: 8px; }

        #result-card { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; border: 1px solid var(--border); }
        #power-value { font-size: 2.2rem; font-weight: 800; margin: 5px 0; text-align: center; }
        .sub-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .metric-box { text-align: center; background: rgba(0,0,0,0.03); padding: 8px; border-radius: 6px; }
        
        details { background: rgba(0,0,0,0.03); border-radius: 6px; padding: 10px; margin-top: 10px; font-size: 0.8rem; }
        .formula-display { font-family: monospace; background: rgba(0,0,0,0.1); padding: 8px; margin-top: 5px; border-radius: 4px; display: block; overflow-x: auto; }

        .tips { font-size: 0.85rem; margin-top: 15px; border-left: 3px solid var(--primary); padding-left: 10px; }
        .reference { margin-top: 25px; font-size: 0.65rem; opacity: 0.6; border-top: 1px solid var(--border); padding-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mechanical Power Calc</h1>

    <div class="form-row">
        <div class="form-group" style="flex: 0.7;">
            <label>Sexo</label>
            <select id="gender" onchange="updatePBW()"><option value="m">Masc</option><option value="f">Fem</option></select>
        </div>
        <div class="form-group">
            <label>Altura (cm)</label>
            <input type="number" id="height" placeholder="175" oninput="updatePBW()">
        </div>
        <div class="form-group">
            <label>Peso (PBW)</label>
            <div id="pbw-display" class="pbw-box">-- kg</div>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Modo</label>
            <select id="mode" onchange="updateFormulaOptions()">
                <option value="vcv">VCV</option>
                <option value="pcv">PCV</option>
            </select>
        </div>
        <div class="form-group">
            <label>Fórmula</label>
            <select id="formula" onchange="updateUIFields()"></select>
        </div>
    </div>

    <div class="form-group" id="group-tv"><label>Volume Corrente (mL)</label><input type="number" id="tv"></div>
    <div class="form-row">
        <div class="form-group"><label>FR (irpm)</label><input type="number" id="rr"></div>
        <div class="form-group"><label>PEEP (cmH2O)</label><input type="number" id="peep"></div>
    </div>
    <div class="form-row">
        <div class="form-group hidden" id="group-peak"><label>P. Pico</label><input type="number" id="peak"></div>
        <div class="form-group hidden" id="group-plat"><label>P. Platô</label><input type="number" id="plat"></div>
        <div class="form-group hidden" id="group-pinsp"><label>Pinsp (∆P)</label><input type="number" id="pinsp"></div>
    </div>
    <div class="form-group hidden" id="group-flow"><label>Fluxo (L/min)</label><input type="number" id="flow" value="60"></div>

    <div class="toggle-row" onclick="togglePneumo()">
        <input type="checkbox" id="pneumo" style="width: auto;">
        <label style="margin:0; cursor:pointer;">Pneumoperitônio Ativo?</label>
    </div>

    <button onclick="calculate()">Calcular</button>

    <div id="result-card">
        <div id="power-value">0.0 J/min</div>
        <div class="sub-metrics">
            <div class="metric-box"><div style="font-size:0.6rem">DRIVING PRESSURE</div><div id="res-dp" style="font-weight:bold">-</div></div>
            <div class="metric-box"><div style="font-size:0.6rem">ML/KG PBW</div><div id="res-mlkg" style="font-weight:bold">-</div></div>
        </div>
        <div class="tips" id="tips"></div>
        
        <details>
            <summary>Memorial de Cálculo</summary>
            <div class="formula-display" id="formula-text"></div>
        </details>

        <button class="btn-copy" onclick="copySummary()">Copiar Resumo para Prontuário</button>
    </div>

    <div class="reference">
        <strong>Referências:</strong> Giosa et al. (2019) | Gattinoni (2016) | Becher (2019). PBW: Devine (1974). 
        Uso do Mechanical Power no transoperatório deve considerar variações de pressão intra-abdominal.
    </div>
</div>

<script>
    let globalMP = 0, globalDP = 0, globalVtKg = 0;

    function updatePBW() {
        const h = parseFloat(document.getElementById('height').value);
        const g = document.getElementById('gender').value;
        if (!h || h < 100) { document.getElementById('pbw-display').innerText = "-- kg"; return 0; }
        let pbw = g === 'm' ? 50 + 0.91 * (h - 152.4) : 45.5 + 0.91 * (h - 152.4);
        document.getElementById('pbw-display').innerText = pbw.toFixed(1) + " kg";
        return pbw;
    }

    function updateFormulaOptions() {
        const mode = document.getElementById('mode').value;
        const fs = document.getElementById('formula');
        fs.innerHTML = mode === 'vcv' ? 
            '<option value="giosa">Giosa (Surrogate)</option><option value="gattinoni">Gattinoni (Original)</option>' : 
            '<option value="becher">Becher (PCV)</option>';
        updateUIFields();
    }

    function updateUIFields() {
        const f = document.getElementById('formula').value;
        const hide = (id) => document.getElementById(id).classList.add('hidden');
        const show = (id) => document.getElementById(id).classList.remove('hidden');
        ['group-peak', 'group-plat', 'group-flow', 'group-pinsp'].forEach(hide);
        if (f === 'giosa') { show('group-peak'); show('group-flow'); }
        if (f === 'gattinoni') { show('group-peak'); show('group-plat'); }
        if (f === 'becher') { show('group-pinsp'); }
    }

    function togglePneumo() {
        const cb = document.getElementById('pneumo');
        cb.checked = !cb.checked;
    }

    function calculate() {
        const f = document.getElementById('formula').value;
        const tv_ml = parseFloat(document.getElementById('tv').value) || 0;
        const rr = parseFloat(document.getElementById('rr').value) || 0;
        const peep = parseFloat(document.getElementById('peep').value) || 0;
        const peak = parseFloat(document.getElementById('peak').value) || 0;
        const plat = parseFloat(document.getElementById('plat').value) || 0;
        const flow = parseFloat(document.getElementById('flow').value) || 0;
        const pinsp = parseFloat(document.getElementById('pinsp').value) || 0;
        const pbw = updatePBW();
        const tv = tv_ml / 1000;

        if (f === 'giosa') { globalMP = ((tv * rr) * (peak + peep + (flow/6))) / 20; globalDP = peak - peep; }
        else if (f === 'gattinoni') { globalMP = 0.098 * rr * tv * (peak - ((plat - peep) / 2)); globalDP = plat - peep; }
        else if (f === 'becher') { globalMP = 0.098 * rr * tv * (peep + pinsp); globalDP = pinsp; }

        if (globalMP <= 0 || isNaN(globalMP)) return alert("Dados insuficientes.");
        
        globalVtKg = pbw > 0 ? (tv_ml / pbw) : 0;
        document.getElementById('result-card').style.display = 'block';
        document.getElementById('power-value').innerText = globalMP.toFixed(1) + " J/min";
        document.getElementById('res-dp').innerText = globalDP.toFixed(0) + " cmH2O";
        document.getElementById('res-mlkg').innerText = globalVtKg > 0 ? globalVtKg.toFixed(1) : "-";
        
        let color = "#10b981";
        if (globalMP >= 12) color = "#f59e0b";
        if (globalMP >= 17) color = "#ef4444";
        document.getElementById('power-value').style.color = color;

        let tips = [];
        if (document.getElementById('pneumo').checked) {
            tips.push("⚡ <strong>Pneumoperitônio:</strong> O aumento do MP é esperado pela restrição da complacência. Considere titular PEEP para reduzir a Driving Pressure.");
        }
        
        if (globalMP >= 12) {
            if (rr >= 20 && (rr/15 > globalDP/12)) tips.push("📌 Foco na FR: Reduzir a frequência pode ser a manobra mais eficaz.");
            else if (globalDP > 14) tips.push("📌 Foco na ∆P: Driving Pressure alta. Reduza volume ou verifique bloqueio neuromuscular.");
        }
        document.getElementById('tips').innerHTML = tips.length ? tips.join('<br>') : "✅ Parâmetros protetores.";
        document.getElementById('formula-text').innerText = f === 'giosa' ? "MP = [VE * (Pico + PEEP + F/6)] / 20" : "MP = 0.098 * FR * Vt * [Pico - (∆P/2)]";
    }

    function copySummary() {
        const text = `Mechanical Power: ${globalMP.toFixed(1)} J/min | DP: ${globalDP.toFixed(0)} | Vt: ${globalVtKg.toFixed(1)} mL/kg PBW.`;
        navigator.clipboard.writeText(text);
        alert("Resumo copiado!");
    }

    updateFormulaOptions();
</script>
</body>
</html>
